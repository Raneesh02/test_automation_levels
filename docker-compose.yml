services:
  postgres_orders:
    image: postgres:15-alpine
    container_name: courier_orders_db
    environment:
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
      POSTGRES_DB: orders_db
    ports:
      - "5432:5432"
    volumes:
      - orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_tracking:
    image: postgres:15-alpine
    container_name: courier_tracking_db
    environment:
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: tracking_pass
      POSTGRES_DB: tracking_db
    ports:
      - "5433:5432"
    volumes:
      - tracking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking_user -d tracking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  orders_data:
  tracking_data:
